<style>
  .task-header {
    margin-bottom: 36px;
  }

  .task-creator {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 56px;
  }

  .task-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .task-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 28px;
    transition: all 0.2s ease;
    border-left: 4px solid transparent;
  }

  .task-row.completed {
    opacity: 0.5;
  }

  .task-row.completed .task-check {
    background: var(--color-accent);
    border-color: #55a85f;
    color: white;
  }

  .task-check {
    width: 32px;
    height: 32px;
    border: 2.5px solid var(--color-border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .task-main {
    flex: 1;
  }

  .task-title {
    font-size: 19px;
    font-weight: 800;
    display: block;
    margin-bottom: 4px;
  }

  .task-row.completed .task-title {
    text-decoration: line-through;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--color-text-muted);
    font-size: 14px;
  }

  .task-goals-summary {
    margin-bottom: 36px;
    padding: 28px;
    background: var(--color-surface-2);
    border-radius: 24px;
    border: 2px solid var(--color-border);
  }

  .task-overdue {
    border-left: 5px solid var(--color-primary) !important;
    background: rgba(255, 107, 107, 0.06) !important;
  }

  .overdue-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--color-primary);
    margin-left: 8px;
  }

  @media (max-width: 768px) {
    .task-form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<header class="task-header">
  <h1 class="fredoka" style="font-size: 40px; margin-bottom: 8px;">Task Manager</h1>
  <p style="color:var(--color-text-muted);">Stay organized and hit your daily goals.</p>
</header>

<div class="task-goals-summary">
  <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
    <span style="font-weight:800; font-family:'Fredoka One',cursive;">Today's Task Goal</span>
    <span id="task-goal-txt">0 / 5 tasks</span>
  </div>
  <div class="goal-bar-track">
    <div id="task-goal-bar" class="goal-bar-fill" style="background:var(--color-accent); width:0%;"></div>
  </div>
</div>

<form id="task-form" class="task-creator card" novalidate>
  <fieldset>
    <legend style="font-family:'Fredoka One',cursive; font-size:1.2rem;">New Task</legend>
    <div class="field-group">
      <label for="task-input">Task description *</label>
      <input type="text" id="task-input" placeholder="What needs to be done? 🎯" required minlength="2" maxlength="80">
      <span class="error-msg"></span>
    </div>
    <div class="task-form-grid">
      <div class="field-group">
        <label for="task-priority">Priority</label>
        <select id="task-priority" required>
          <option value="high">🔥 High Priority (+20 pts)</option>
          <option value="medium" selected>⚡ Medium Priority (+10 pts)</option>
          <option value="low">🥉 Low Priority (+5 pts)</option>
        </select>
        <span class="error-msg"></span>
      </div>
      <div class="field-group">
        <label for="task-due">Due date (optional)</label>
        <input type="date" id="task-due" min="">
        <span class="error-msg"></span>
      </div>
    </div>
    <button type="submit" class="btn-primary"><i class="ph ph-plus-bold"></i> Add Task</button>
  </fieldset>
</form>

<div id="task-list" class="task-list"></div>
<div id="tasks-empty" class="empty-state" style="display:none;">
  <i class="ph ph-target float"></i>
  <h3 class="fredoka">Your board is clear!</h3>
  <p>Add a task above to start earning points.</p>
</div>

<script>
  (function () {
    function renderTasks() {
      const tasks = getItem('ff_tasks') || [];
      const list = document.getElementById('task-list');
      const empty = document.getElementById('tasks-empty');
      const today = getTodayString();

      list.innerHTML = '';
      const incomplete = tasks.filter(t => !t.completed);
      const completed = tasks.filter(t => t.completed);
      const allSorted = [...incomplete, ...completed];
      empty.style.display = allSorted.length === 0 ? 'flex' : 'none';

      allSorted.forEach(t => {
        const isOverdue = t.dueDate && t.dueDate < today && !t.completed;
        const row = document.createElement('div');
        row.className = `task-row card ${t.completed ? 'completed' : ''} ${isOverdue ? 'task-overdue' : ''}`;
        row.setAttribute('draggable', 'true');
        row.dataset.id = t.id;
        row.innerHTML = `
          <div class="task-check" onclick="toggleTask(${t.id})">
            ${t.completed ? '<i class="ph ph-check-bold"></i>' : ''}
          </div>
          <div class="task-main">
            <span class="task-title">
              ${t.text}
              ${isOverdue ? '<span class="overdue-label">OVERDUE</span>' : ''}
            </span>
            <div class="task-meta">
              <span class="badge badge-${t.priority}">${t.priority.toUpperCase()}</span>
              ${t.dueDate ? `<span>📅 ${t.dueDate}</span>` : ''}
              <span>• Added ${t.createdAt}</span>
            </div>
          </div>
          <button class="btn-ghost" onclick="deleteTask(${t.id})" style="font-size:24px;"><i class="ph ph-trash"></i></button>
        `;
        list.appendChild(row);
      });
      updateTaskGoalProgress();
    }

    function updateTaskGoalProgress() {
      const tasks = getItem('ff_tasks') || [];
      const today = getTodayString();
      const target = getItem('ff_daily_goal_tasks') || 5;
      const doneToday = tasks.filter(t => t.createdAt === today && t.completed).length;
      document.getElementById('task-goal-txt').textContent = `${doneToday} / ${target} tasks`;
      document.getElementById('task-goal-bar').style.width = Math.min(100, (doneToday / target) * 100) + '%';
    }

    window.handleAddTask = function () {
      const input = document.getElementById('task-input');
      const priority = document.getElementById('task-priority');
      const due = document.getElementById('task-due');

      if (!validateField(input, { required: true, minLength: 2, maxLength: 80 }) ||
        !validateField(priority, { required: true })) return;

      const tasks = getItem('ff_tasks') || [];
      tasks.unshift({
        id: Date.now(),
        text: input.value.trim(),
        priority: priority.value,
        completed: false,
        createdAt: getTodayString(),
        dueDate: due.value || "",
        points: priority.value === 'high' ? 20 : (priority.value === 'medium' ? 10 : 5)
      });
      setItem('ff_tasks', tasks);
      input.value = '';
      due.value = '';
      renderTasks();
    };

    window.toggleTask = function (id) {
      const tasks = getItem('ff_tasks') || [];
      const t = tasks.find(x => x.id === id);
      if (t) {
        t.completed = !t.completed;
        if (t.completed) {
          t.completedAt = getTodayString();
          addPoints(t.points);
          showMotivationPopup('task');
          const score = getScore();
          if (score >= 100 && checkBadgeFirstEarn('pts_100')) launchConfetti();
        } else {
          t.completedAt = null;
          addPoints(-t.points);
        }
        setItem('ff_tasks', tasks);
        renderTasks();
      }
    };

    window.deleteTask = function (id) {
      if (confirm("Delete this task?")) {
        const tasks = getItem('ff_tasks') || [];
        setItem('ff_tasks', tasks.filter(x => x.id !== id));
        renderTasks();
      }
    };

    // Form submission
    document.getElementById('task-form').addEventListener('submit', (e) => {
      e.preventDefault();
      handleAddTask();
    });

    // Real-time validation
    document.getElementById('task-input').addEventListener('blur', function () {
      validateField(this, { required: true, minLength: 2, maxLength: 80 });
    });
    document.getElementById('task-priority').addEventListener('change', function () {
      validateField(this, { required: true });
    });

    // Drag and drop
    enableTaskDragAndDrop();

    const page = document.getElementById('page-tasks');
    if (page) page.addEventListener('pageActivated', renderTasks);
    document.getElementById('task-due').min = getTodayString();
    renderTasks();
  })();
</script>
