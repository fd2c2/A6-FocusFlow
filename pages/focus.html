  </video>

  <button id="dw-deep-toggle-btn">⏸ Pause</button>
  <button onclick="focusExitDeepWork()"
    style="position:fixed; bottom:40px; right:40px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:white; font-size:13px; font-weight:700; cursor:pointer; padding:12px 24px; border-radius:14px; backdrop-filter:blur(8px); z-index: 10;">
    Exit Deep Work
  </button>

<script>
  (function () {
    let focusTimerId = null;
    let focusTimeLeft = 25 * 60;
    let focusCurrentMode = 'focus';
    let focusSessionsDone = 0;
    let focusDeepWorkActive = false;

    const audio = document.getElementById('focus-audio');
    const soundSelect = document.getElementById('sound-select');
    const audioPlayerDiv = document.getElementById('audio-player');
    const playBtn = document.getElementById('music-play-btn');
    const trackNameEl = document.getElementById('music-track-name');
    const volumeBtn = document.getElementById('music-volume-btn');

    // Init values
    const savedWork = getItem('ff_timer_work');
    if (savedWork) document.getElementById('inp-work').value = savedWork;
    const savedBreak = getItem('ff_timer_break');
    if (savedBreak) document.getElementById('inp-short').value = savedBreak;

    window.switchMode = function (mode) {
      clearInterval(focusTimerId);
      focusTimerId = null;
      focusCurrentMode = mode;
      const work = parseInt(getItem('ff_timer_work')) || 25;
      const short = parseInt(getItem('ff_timer_break')) || 5;
      focusTimeLeft = (mode === 'focus' ? work : short) * 60;

      const btn = document.getElementById('timer-toggle-btn');
      btn.innerHTML = `<i class="ph ph-play-fill"></i> Start ${mode === 'focus' ? 'Focus' : 'Break'}`;
      document.getElementById('timer-status').textContent = mode === 'focus' ? 'Time to work' : 'Time for a break';

      document.querySelectorAll('.mode-icon-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById('btn-mode-' + mode);
      if (activeBtn) activeBtn.classList.add('active');

      focusUpdateDisplay();
      focusRenderDots();

      // Update deep work toggle button if active
      if (focusDeepWorkActive) updateDeepToggleButton();
    };

    function focusUpdateDisplay() {
      const m = Math.floor(focusTimeLeft / 60);
      const s = focusTimeLeft % 60;
      const str = m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
      document.getElementById('timer-display').textContent = str;
      if (focusDeepWorkActive || document.fullscreenElement) {
        document.title = `${str} - FocusFlow`;
      }
    }

    window.focusToggleTimer = function () {
      const btn = document.getElementById('timer-toggle-btn');
      if (focusTimerId) {
        clearInterval(focusTimerId);
        focusTimerId = null;
        btn.innerHTML = `<i class="ph ph-play-fill"></i> Resume`;
        if (audio) audio.pause();
        if (typeof stopChimeLoop === 'function') stopChimeLoop();
      } else {
        btn.innerHTML = `<i class="ph ph-pause-fill"></i> Pause`;
        if (typeof stopChimeLoop === 'function') stopChimeLoop();
        if (soundSelect.value !== '' && audio) audio.play().catch(() => { });
        focusTimerId = setInterval(() => {
          focusTimeLeft--;
          focusUpdateDisplay();
          if (focusTimeLeft <= 0) {
            clearInterval(focusTimerId);
            focusTimerId = null;
            if (typeof startChimeLoop === 'function') startChimeLoop();
            if (focusCurrentMode === 'focus') {
              if (typeof addPoints === 'function') addPoints(10);
              if (typeof showMotivationPopup === 'function') showMotivationPopup('session');
              focusSessionsDone++;
              const sessions = getItem('ff_sessions') || [];
              sessions.push({ id: Date.now(), date: getTodayString(), duration: parseInt(getItem('ff_timer_work') || 25) });
              setItem('ff_sessions', sessions);
              if (typeof launchConfetti === 'function') launchConfetti();
            }
            switchMode(focusCurrentMode === 'focus' ? 'short' : 'focus');
          }
        }, 1000);
      }
      if (focusDeepWorkActive) updateDeepToggleButton();
    };

    function updateDeepToggleButton() {
      const deepBtn = document.getElementById('dw-deep-toggle-btn');
      if (!deepBtn) return;
      if (focusTimerId) {
        deepBtn.innerHTML = '⏸ Pause';
      } else {
        deepBtn.innerHTML = '▶ Start';
      }
    }

    window.focusSaveTimerSettings = function () {
      const w = document.getElementById('inp-work').value;
      const s = document.getElementById('inp-short').value;
      setItem('ff_timer_work', parseInt(w));
      setItem('ff_timer_break', parseInt(s));
      switchMode('focus');
    };

    window.focusToggleFullScreen = function () {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => console.error(err));
      } else {
        document.exitFullscreen();
      }
    };

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.body.classList.remove('fullscreen-active');
        document.getElementById('fs-btn').innerHTML = '<i class="ph ph-arrows-out"></i><span>Full Screen</span>';
        if (focusDeepWorkActive) focusExitDeepWork();
        document.title = "Focus Lab - FocusFlow";
      } else {
        document.body.classList.add('fullscreen-active');
        document.getElementById('fs-btn').innerHTML = '<i class="ph ph-arrows-in"></i><span>Exit Full</span>';
      }
    });

    window.focusEnterDeepWork = function () {
      focusDeepWorkActive = true;
      document.body.classList.add('dw-active');
      const container = document.getElementById('dw-container');
      const slot = document.getElementById('dw-timer-slot');
      const card = document.getElementById('focus-timer-card');
      const video = document.getElementById('dw-video');

      const existing = document.body.querySelector(':scope > #dw-container');
      if (existing && existing !== container) existing.remove();
      document.body.appendChild(container);
      if (slot && card) slot.appendChild(card);
      container.style.display = 'flex';

      // Video handling
      if (video) {
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.load();
        const tryPlay = () => {
          video.play().catch(e => console.log("Video play blocked", e));
        };
        if (video.readyState >= 3) tryPlay();
        else video.oncanplay = tryPlay;
      }

      const quotes = [
        "Focus is a matter of deciding what things you're not going to do.",
        "Deep Work is the superpower of the 21st century.",
        "Energy and persistence conquer all things.",
        "The secret of getting ahead is getting started.",
        "Your focus determines your reality.",
        "Work hard in silence, let your success be your noise."
      ];
      const qEl = document.getElementById('dw-quote');
      if (qEl) qEl.textContent = '"' + quotes[Math.floor(Math.random() * quotes.length)] + '"';

      // Add toggle button listener
      const deepToggle = document.getElementById('dw-deep-toggle-btn');
      if (deepToggle) {
        deepToggle.onclick = () => focusToggleTimer();
        updateDeepToggleButton();
      }

      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    };

    window.focusExitDeepWork = function () {
      focusDeepWorkActive = false;
      document.body.classList.remove('dw-active');
      const container = document.getElementById('dw-container');
      const card = document.getElementById('focus-timer-card');
      const mainCont = document.getElementById('main-focus-container');
      const video = document.getElementById('dw-video');
      if (video) video.pause();
      if (mainCont && card) mainCont.prepend(card);
      if (container) container.style.display = 'none';
      if (document.fullscreenElement) document.exitFullscreen();
      document.title = "Focus Lab - FocusFlow";
    };

    function focusRenderDots() {
      const row = document.getElementById('cycle-dots-row');
      if (!row) return;
      row.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const dot = document.createElement('div');
        const filled = i < (focusSessionsDone % 4);
        dot.style.cssText = `width:10px; height:10px; border-radius:50%; background:${filled ? 'var(--color-primary)' : 'var(--color-border)'};`;
        row.appendChild(dot);
      }
    }

    window.toggleMusicPlay = function () {
      if (!audio) return;
      audio.paused ? audio.play().catch(() => {}) : audio.pause();
      updatePlayButton();
    };

    window.toggleMute = function () {
      if (!audio) return;
      audio.muted = !audio.muted;
      const icon = volumeBtn?.querySelector('i');
      if (icon) icon.className = audio.muted ? 'ph ph-speaker-x' : 'ph ph-speaker-high';
    };

    window.changeSound = function () {
      const source = document.getElementById('audio-source');
      if (soundSelect.value === '') {
        if (audio) audio.pause();
        audioPlayerDiv.style.display = 'none';
      } else {
        source.src = soundSelect.value;
        if (audio) {
          audio.load();
          audioPlayerDiv.style.display = 'block';
          const sel = soundSelect.options[soundSelect.selectedIndex];
          if (trackNameEl) trackNameEl.textContent = sel ? sel.text : 'Unknown';
          if (!audio.paused || focusTimerId) audio.play().catch(() => {});
          updatePlayButton();
        }
      }
    };

    function updatePlayButton() {
      const icon = playBtn ? playBtn.querySelector('i') : null;
      if (icon && audio) icon.className = !audio.paused ? 'ph ph-pause' : 'ph ph-play';
    }

    if (audio) {
      audio.addEventListener('play', updatePlayButton);
      audio.addEventListener('pause', updatePlayButton);
    }

    const page = document.getElementById('page-focus');
    if (page) {
      page.addEventListener('pageActivated', () => {
        focusRenderDots();
        focusUpdateDisplay();
      });
    }

    window.addEventListener('focus', () => {
      if (typeof stopChimeLoop === 'function') stopChimeLoop();
    });

    focusRenderDots();
    focusUpdateDisplay();
  })();
</script>
